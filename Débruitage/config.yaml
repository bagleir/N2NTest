# FastDVDnet N2N — Configuration
# Tous les chemins sont relatifs à la racine du projet (Stage/)
# (résolus automatiquement par train.py et inference.py)

# Lr = 2.8e-4 epochs 200 batch-size = 64

data:
  # ── Sources vidéo ─────────────────────────────────────────────────────
  video_dirs:
    - "TemporelIntegrale"
  video_pattern: "*.avi"

  mask_path: "PretraitementIntegrale/mask.png"
  patch_size: 128          # taille par défaut (rétrocompatibilité — ignoré si multi_scale.enabled)
  frames_per_clip: 5
  train_split: 0.80
  val_split:   0.20

  # ── Multi-scale training ───────────────────────────────────────────────
  # Si enabled=false → seul patch_size est utilisé, comportement identique
  # à l'ancienne version (aucune régression possible).
  # Les poids doivent sommer à 1.0 ; sinon ils sont normalisés automatiquement
  # avec un warning au démarrage.
  multi_scale:
    enabled: true
    scales:
      - size:       128
        weight:     0.75    # 70 % des samples
        batch_size: 64
        grad_clip:  1.0
      - size:       256
        weight:     0.25    # 20 % des samples
        batch_size: 16
        grad_clip:  1.0
        
  # ── Stratégie N2N ─────────────────────────────────────────────────────
  # "B"    : bruit synthétique uniquement (recommandé — paires A non validées)
  # "A"    : inter-vidéo uniquement (activer après validation ECC)
  # "auto" : A si paires disponibles (70 %), B sinon
  force_strategy: "B"

  # Alignement ECC (stratégie A uniquement)
  ecc_max_px:           3.0
  min_pair_correlation: 0.85
  ecc_validation_n:     20

  # ── Stratégie B — construction des paires ────────────────────────────
  temporal_offset: 3     # frames entre input et target (doit être > 2)
  sigma_noise:   4.4
  poisson_scale: 0.5

model:
  features: 64

training:
  epochs:        200      # augmenté (était 100)
  batch_size:    8        # utilisé uniquement si multi_scale.enabled=false

  lr:            1.0e-4   # augmenté selon linear scaling rule (était 1.0e-4)
  warmup_epochs: 3        # LR monte linéairement de lr/20 → lr sur ces epochs
                          # puis CosineAnnealingLR jusqu'à la fin

  # Poids de la loss totale
  w_l1:             0.70
  w_ssim:           0.30
  w_gradient:       0.10
  lambda_temporal:  0.10
  lambda_pulsation: 0.05
  pulsation_threshold: 0.7

  grad_clip: 1.0          # fallback si la taille n'est pas dans multi_scale.scales

  optimizer: adam
  scheduler: cosine

  checkpoint_dir: "Débruitage/checkpoints"
  samples_dir:    "Débruitage/training_samples"
  save_every_n_epochs: 3
  log_every_n_epochs:  5

  mixed_precision: true
  num_workers: 8
  pin_memory:  true
  samples_per_epoch_multiplier: 256
  recursive_video_scan: true

  # ── Alertes de surveillance ────────────────────────────────────────────
  oscillation_std_threshold: 0.010
  oscillation_min_epoch:     40
  stagnation_patience:       30

sr:
  scale_factor:    2
  drop_size:       0.7
  upsample_factor: 100
  n_frames_max:    null
  min_frames:      20

inference:
  # inference.py n'a PAS besoin d'être modifié pour le multi-scale :
  # FastDVDnet est fully convolutional et traite les frames 512×512 entières
  # en un seul passage, quelle que soit la taille utilisée à l'entraînement.
  checkpoint: "Débruitage/checkpoints/best_model.pth"
  output_dir: "Débruitage/denoised"

  temporal_median:
    window_size: 5
    gaussian_weights: true

  comparison:
    enabled:   true
    n_frames:  5
    crop_size: 150
